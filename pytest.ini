[pytest]
markers =
    integration: marks tests as requiring a live HFSS instance (deselect with -m "not integration")

asyncio_mode = auto

# 仅在 tests/ 目录收集
testpaths = tests

# 隐藏第三方内部警告
filterwarnings =
    ignore::DeprecationWarning:langchain.*:
    ignore::DeprecationWarning:pydantic.*:
